<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Parser Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="light"] {
    --color-bg: #f7f6f2;
    --color-surface: #f9f8f5;
    --color-surface-2: #fbfbf9;
    --color-surface-offset: #f3f0ec;
    --color-surface-dynamic: #e6e4df;
    --color-divider: #dcd9d5;
    --color-border: #d4d1ca;
    --color-text: #28251d;
    --color-text-muted: #7a7974;
    --color-text-faint: #bab9b4;
    --color-text-inverse: #f9f8f4;
    --color-primary: #01696f;
    --color-primary-hover: #0c4e54;
    --color-primary-highlight: #cedcd8;
    --color-success: #437a22;
    --color-success-highlight: #d4dfcc;
    --color-warning: #964219;
    --color-warning-highlight: #ddcfc6;
    --color-error: #a12c7b;
    --color-blue: #006494;
    --color-blue-highlight: #c6d8e4;
    --radius-sm: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
    --radius-full: 9999px;
    --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
    --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
    --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
    --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    --font-body: 'Inter', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
    --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
    --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
    --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
    --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
    --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
    --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
    --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
    --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
    --space-16: 4rem;
  }
  [data-theme="dark"] {
    --color-bg: #171614;
    --color-surface: #1c1b19;
    --color-surface-2: #201f1d;
    --color-surface-offset: #1d1c1a;
    --color-surface-dynamic: #2d2c2a;
    --color-divider: #262523;
    --color-border: #393836;
    --color-text: #cdccca;
    --color-text-muted: #797876;
    --color-text-faint: #5a5957;
    --color-text-inverse: #2b2a28;
    --color-primary: #4f98a3;
    --color-primary-hover: #227f8b;
    --color-primary-highlight: #313b3b;
    --color-success: #6daa45;
    --color-success-highlight: #3a4435;
    --color-warning: #bb653b;
    --color-warning-highlight: #564942;
    --color-error: #d163a7;
    --color-blue: #5591c7;
    --color-blue-highlight: #3a4550;
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
    --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
    --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
  }
  @media (prefers-color-scheme: dark) { :root:not([data-theme]) {
    --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
    --color-surface-offset: #1d1c1a; --color-surface-dynamic: #2d2c2a;
    --color-divider: #262523; --color-border: #393836;
    --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
    --color-text-inverse: #2b2a28; --color-primary: #4f98a3; --color-primary-hover: #227f8b;
    --color-primary-highlight: #313b3b; --color-success: #6daa45;
    --color-success-highlight: #3a4435; --color-warning: #bb653b;
    --color-blue: #5591c7; --color-blue-highlight: #3a4550;
    --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2); --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
    --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
  }}

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
  body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-bg); line-height: 1.6; }
  button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
  table { border-collapse: collapse; width: 100%; }
  input, select { font: inherit; color: inherit; }
  :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
  a, button, input, select { transition: color var(--transition), background var(--transition), border-color var(--transition), box-shadow var(--transition); }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

  /* Layout */
  .app { display: grid; grid-template-rows: auto 1fr; min-height: 100dvh; }
  header { background: var(--color-surface); border-bottom: 1px solid var(--color-divider); padding: var(--space-4) var(--space-6); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { display: flex; align-items: center; gap: var(--space-3); }
  .logo-mark { color: var(--color-primary); }
  .logo-text { font-size: var(--text-base); font-weight: 600; letter-spacing: -0.02em; }
  .header-actions { display: flex; align-items: center; gap: var(--space-3); }
  .theme-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); color: var(--color-text-muted); }
  .theme-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }

  main { padding: var(--space-8) var(--space-6); max-width: 1100px; margin: 0 auto; width: 100%; }

  /* Upload Zone */
  .upload-section { margin-bottom: var(--space-8); }
  .upload-zone { border: 2px dashed var(--color-border); border-radius: var(--radius-xl); padding: var(--space-12) var(--space-8); text-align: center; cursor: pointer; transition: border-color var(--transition), background var(--transition); background: var(--color-surface); }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--color-primary); background: color-mix(in oklch, var(--color-primary) 4%, var(--color-surface)); }
  .upload-zone.has-file { border-color: var(--color-success); border-style: solid; background: color-mix(in oklch, var(--color-success) 4%, var(--color-surface)); }
  .upload-icon { width: 48px; height: 48px; margin: 0 auto var(--space-4); color: var(--color-text-faint); }
  .upload-zone.drag-over .upload-icon { color: var(--color-primary); }
  .upload-zone.has-file .upload-icon { color: var(--color-success); }
  .upload-title { font-size: var(--text-lg); font-weight: 600; margin-bottom: var(--space-2); }
  .upload-sub { font-size: var(--text-sm); color: var(--color-text-muted); }
  .upload-sub span { color: var(--color-primary); font-weight: 500; cursor: pointer; }
  .file-input { display: none; }

  /* File Queue */
  .file-queue { margin-top: var(--space-4); display: flex; flex-direction: column; gap: var(--space-2); }
  .file-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); background: var(--color-surface); border: 1px solid var(--color-divider); border-radius: var(--radius-lg); }
  .file-icon { flex-shrink: 0; width: 32px; height: 32px; border-radius: var(--radius-md); background: var(--color-primary-highlight); display: flex; align-items: center; justify-content: center; color: var(--color-primary); }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: var(--text-sm); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: var(--text-xs); color: var(--color-text-muted); }
  .file-status { flex-shrink: 0; font-size: var(--text-xs); padding: 2px var(--space-2); border-radius: var(--radius-full); font-weight: 500; }
  .status-pending { background: var(--color-surface-dynamic); color: var(--color-text-muted); }
  .status-parsing { background: var(--color-blue-highlight); color: var(--color-blue); }
  .status-done { background: var(--color-success-highlight); color: var(--color-success); }
  .status-error { background: oklch(from var(--color-error) l c h / 0.15); color: var(--color-error); }
  .remove-btn { flex-shrink: 0; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); color: var(--color-text-faint); }
  .remove-btn:hover { background: var(--color-surface-offset); color: var(--color-text-muted); }

  /* Controls */
  .controls { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-6); flex-wrap: wrap; }
  .parse-type-select { padding: var(--space-2) var(--space-4); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); font-size: var(--text-sm); color: var(--color-text); cursor: pointer; }
  .parse-type-select:hover { border-color: var(--color-primary); }
  .btn { padding: var(--space-2) var(--space-5); border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500; display: inline-flex; align-items: center; gap: var(--space-2); }
  .btn-primary { background: var(--color-primary); color: var(--color-text-inverse); }
  .btn-primary:hover { background: var(--color-primary-hover); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { color: var(--color-text-muted); border: 1px solid var(--color-border); }
  .btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }

  /* Progress */
  .progress-bar { height: 3px; background: var(--color-divider); border-radius: var(--radius-full); margin-bottom: var(--space-6); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--color-primary); border-radius: var(--radius-full); transition: width 0.3s ease; }

  /* Results */
  .results-section { display: none; }
  .results-section.visible { display: block; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); flex-wrap: wrap; gap: var(--space-3); }
  .results-title { font-size: var(--text-lg); font-weight: 600; }
  .results-actions { display: flex; gap: var(--space-2); }

  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--color-divider); margin-bottom: var(--space-6); overflow-x: auto; }
  .tab { padding: var(--space-3) var(--space-4); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
  .tab:hover { color: var(--color-text); }
  .tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

  /* Content panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Raw Text */
  .text-output { background: var(--color-surface); border: 1px solid var(--color-divider); border-radius: var(--radius-lg); padding: var(--space-6); font-family: var(--font-mono); font-size: var(--text-xs); line-height: 1.8; color: var(--color-text); white-space: pre-wrap; word-break: break-word; max-height: 500px; overflow-y: auto; }
  .text-output::-webkit-scrollbar { width: 6px; }
  .text-output::-webkit-scrollbar-track { background: transparent; }
  .text-output::-webkit-scrollbar-thumb { background: var(--color-divider); border-radius: var(--radius-full); }

  /* Table */
  .table-wrap { overflow-x: auto; border: 1px solid var(--color-divider); border-radius: var(--radius-lg); }
  .data-table { width: 100%; font-size: var(--text-sm); }
  .data-table th { padding: var(--space-3) var(--space-4); background: var(--color-surface-offset); color: var(--color-text-muted); font-weight: 600; text-align: left; font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--color-divider); white-space: nowrap; }
  .data-table td { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-divider); vertical-align: top; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--color-surface-offset); }
  .amount-credit { color: var(--color-success); font-weight: 500; font-variant-numeric: tabular-nums; }
  .amount-debit { color: var(--color-warning); font-weight: 500; font-variant-numeric: tabular-nums; }
  .mono { font-family: var(--font-mono); font-size: var(--text-xs); }

  /* Summary cards */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
  .summary-card { background: var(--color-surface); border: 1px solid var(--color-divider); border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5); }
  .summary-label { font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; margin-bottom: var(--space-2); }
  .summary-value { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); font-variant-numeric: tabular-nums; }
  .summary-value.positive { color: var(--color-success); }
  .summary-value.negative { color: var(--color-warning); }

  /* Key points */
  .key-points { display: flex; flex-direction: column; gap: var(--space-3); }
  .key-point { display: flex; gap: var(--space-3); padding: var(--space-4); background: var(--color-surface); border: 1px solid var(--color-divider); border-radius: var(--radius-lg); }
  .kp-num { flex-shrink: 0; width: 24px; height: 24px; border-radius: var(--radius-full); background: var(--color-primary-highlight); color: var(--color-primary); font-size: var(--text-xs); font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .kp-text { font-size: var(--text-sm); color: var(--color-text); line-height: 1.6; }

  /* Multi-file selector */
  .file-selector { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-4); }
  .file-tag { padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 500; border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text-muted); cursor: pointer; }
  .file-tag.active { background: var(--color-primary-highlight); border-color: var(--color-primary); color: var(--color-primary); }

  /* Empty state */
  .empty-result { text-align: center; padding: var(--space-16) var(--space-8); color: var(--color-text-muted); }
  .empty-result svg { margin: 0 auto var(--space-4); color: var(--color-text-faint); }
  .empty-result h3 { font-size: var(--text-base); font-weight: 600; color: var(--color-text); margin-bottom: var(--space-2); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }

  /* Toast */
  .toast { position: fixed; bottom: var(--space-6); right: var(--space-6); padding: var(--space-3) var(--space-5); background: var(--color-text); color: var(--color-bg); border-radius: var(--radius-lg); font-size: var(--text-sm); font-weight: 500; box-shadow: var(--shadow-lg); transform: translateY(100px); opacity: 0; transition: transform 0.3s ease, opacity 0.3s ease; z-index: 1000; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 640px) {
    main { padding: var(--space-6) var(--space-4); }
    header { padding: var(--space-3) var(--space-4); }
    .controls { gap: var(--space-2); }
    .btn { padding: var(--space-2) var(--space-4); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <svg class="logo-mark" aria-label="PDF Parser Pro" width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <circle cx="20" cy="20" r="6" fill="var(--color-primary)"/>
        <path d="M17.5 20h5M20 17.5v5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">PDF Parser Pro</span>
    </div>
    <div class="header-actions">
      <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <!-- Upload -->
    <div class="upload-section">
      <div class="upload-zone" id="uploadZone">
        <svg class="upload-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="8" y="6" width="24" height="30" rx="3" stroke-width="2"/>
          <path d="M16 12h12M16 18h12M16 24h8" stroke-linecap="round"/>
          <circle cx="36" cy="36" r="10" fill="var(--color-bg)" stroke-width="2"/>
          <path d="M36 31v10M31 36l5-5 5 5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="upload-title">Drop PDFs here</div>
        <div class="upload-sub">or <span id="browseLink">browse files</span> — bank statements, account docs, news articles</div>
        <input type="file" id="fileInput" class="file-input" accept=".pdf" multiple>
      </div>
      <div class="file-queue" id="fileQueue"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <select class="parse-type-select" id="parseType">
        <option value="auto">Auto-detect type</option>
        <option value="bank">Bank Statement</option>
        <option value="account">Account Statement</option>
        <option value="news">News / Article</option>
        <option value="general">General Document</option>
      </select>
      <button class="btn btn-primary" id="parseBtn" disabled>
        <span id="parseBtnText">Parse PDFs</span>
      </button>
      <button class="btn btn-ghost" id="clearBtn">Clear all</button>
    </div>

    <!-- Progress -->
    <div class="progress-bar" id="progressBar" style="display:none">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <!-- Results -->
    <div class="results-section" id="resultsSection">
      <div class="results-header">
        <div class="results-title" id="resultsTitle">Parsed Results</div>
        <div class="results-actions">
          <button class="btn btn-ghost" id="copyBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn btn-ghost" id="downloadBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
        </div>
      </div>

      <!-- File selector (multi-file) -->
      <div class="file-selector" id="fileSelector"></div>

      <!-- Tabs -->
      <div class="tabs" id="tabsBar">
        <button class="tab active" data-tab="structured">Structured View</button>
        <button class="tab" data-tab="raw">Raw Text</button>
        <button class="tab" data-tab="summary">Summary</button>
      </div>

      <div class="panel active" id="panel-structured">
        <div id="structuredContent"></div>
      </div>
      <div class="panel" id="panel-raw">
        <div class="text-output" id="rawContent"></div>
      </div>
      <div class="panel" id="panel-summary">
        <div id="summaryContent"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  // Theme
  (function(){
    const t = document.querySelector('[data-theme-toggle]');
    const r = document.documentElement;
    let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    r.setAttribute('data-theme', d);
    const sunIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    const moonIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    if (d === 'dark') t.innerHTML = sunIcon;
    t.addEventListener('click', () => {
      d = d === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', d);
      t.innerHTML = d === 'dark' ? sunIcon : moonIcon;
    });
  })();

  // PDF.js
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // State
  let files = [];
  let results = [];
  let activeFileIdx = 0;

  // DOM refs
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const fileQueue = document.getElementById('fileQueue');
  const parseBtn = document.getElementById('parseBtn');
  const parseBtnText = document.getElementById('parseBtnText');
  const clearBtn = document.getElementById('clearBtn');
  const parseType = document.getElementById('parseType');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const resultsSection = document.getElementById('resultsSection');
  const fileSelector = document.getElementById('fileSelector');
  const structuredContent = document.getElementById('structuredContent');
  const rawContent = document.getElementById('rawContent');
  const summaryContent = document.getElementById('summaryContent');
  const resultsTitle = document.getElementById('resultsTitle');

  // Upload handlers
  document.getElementById('browseLink').addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('click', (e) => { if (e.target.id !== 'browseLink') fileInput.click(); });
  fileInput.addEventListener('change', (e) => addFiles(Array.from(e.target.files)));
  uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    addFiles(Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf'));
  });

  function addFiles(newFiles) {
    newFiles.forEach(f => {
      if (!files.find(x => x.name === f.name)) {
        files.push({ file: f, name: f.name, size: f.size, status: 'pending' });
      }
    });
    renderQueue();
    parseBtn.disabled = files.length === 0;
    if (files.length > 0) uploadZone.classList.add('has-file');
  }

  function renderQueue() {
    fileQueue.innerHTML = '';
    files.forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      const statusClass = { pending:'status-pending', parsing:'status-parsing', done:'status-done', error:'status-error' }[f.status];
      const statusLabel = { pending:'Pending', parsing:'Parsing...', done:'Done', error:'Error' }[f.status];
      item.innerHTML = `
        <div class="file-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="file-info">
          <div class="file-name">${f.name}</div>
          <div class="file-size">${(f.size/1024).toFixed(1)} KB</div>
        </div>
        <span class="file-status ${statusClass}">${statusLabel}</span>
        <button class="remove-btn" data-idx="${i}" aria-label="Remove file">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      fileQueue.appendChild(item);
    });
    fileQueue.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        files.splice(parseInt(btn.dataset.idx), 1);
        renderQueue();
        parseBtn.disabled = files.length === 0;
        if (files.length === 0) uploadZone.classList.remove('has-file');
      });
    });
  }

  clearBtn.addEventListener('click', () => {
    files = []; results = [];
    renderQueue();
    parseBtn.disabled = true;
    uploadZone.classList.remove('has-file');
    resultsSection.classList.remove('visible');
    progressBar.style.display = 'none';
    fileInput.value = '';
  });

  // Parse
  parseBtn.addEventListener('click', async () => {
    if (files.length === 0) return;
    parseBtn.disabled = true;
    parseBtnText.innerHTML = '<span class="spinner"></span> Parsing...';
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';
    results = [];

    for (let i = 0; i < files.length; i++) {
      files[i].status = 'parsing';
      renderQueue();
      try {
        const text = await extractPdfText(files[i].file);
        const type = parseType.value === 'auto' ? detectType(text) : parseType.value;
        const parsed = parseDocument(text, type, files[i].name);
        results.push({ name: files[i].name, type, text, parsed });
        files[i].status = 'done';
      } catch(e) {
        files[i].status = 'error';
        results.push({ name: files[i].name, type: 'error', text: '', parsed: null, error: e.message });
      }
      renderQueue();
      progressFill.style.width = ((i+1)/files.length*100) + '%';
    }

    parseBtnText.textContent = 'Parse PDFs';
    parseBtn.disabled = false;
    showResults();
    showToast(`✓ ${results.filter(r=>r.type!=='error').length} file(s) parsed`);
  });

  async function extractPdfText(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      fullText += pageText + '\n';
    }
    return fullText.trim();
  }

  function detectType(text) {
    const lower = text.toLowerCase();
    if (/debit|credit|balance|transaction|ifsc|account no|upi|neft|rtgs|imps/.test(lower)) return 'bank';
    if (/invoice|statement|account|amount due|payment|billing/.test(lower)) return 'account';
    if (/published|reporter|journalist|editorial|breaking news|correspondent/.test(lower)) return 'news';
    return 'general';
  }

  function parseDocument(text, type, name) {
    if (type === 'bank') return parseBankStatement(text);
    if (type === 'account') return parseAccountStatement(text);
    if (type === 'news') return parseNews(text);
    return parseGeneral(text);
  }

  function parseBankStatement(text) {
    const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
    const transactions = [];
    // Flexible regex for common bank statement patterns
    const txnRegex = /([\d]{1,2}[\/-][\d]{1,2}[\/-][\d]{2,4}|[\d]{2}\s+(?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[\s\S]*?(?:20\d{2})?).*?([\d,]+\.\d{2})/gi;
    // Simpler: scan for lines with dates and amounts
    const datePattern = /^(\d{1,2}[\/-]\d{1,2}[\/-]\d{2,4}|\d{4}[\/-]\d{2}[\/-]\d{2})/;
    const amtPattern = /(\d{1,3}(?:,\d{3})*\.\d{2})/g;

    lines.forEach(line => {
      const dateMatch = line.match(datePattern);
      const amts = line.match(amtPattern);
      if (dateMatch && amts) {
        const date = dateMatch[0];
        const desc = line.replace(datePattern, '').replace(amtPattern, '').trim().replace(/\s+/g,' ');
        const isCredit = /credit|cr|deposit|received|refund/i.test(line);
        const isDebit = /debit|dr|withdrawal|paid|payment/i.test(line);
        transactions.push({
          date,
          description: desc.slice(0,80) || 'Transaction',
          debit: isDebit && amts[0] ? amts[0] : (amts.length >= 2 && !isCredit ? amts[0] : ''),
          credit: isCredit && amts[0] ? amts[0] : (amts.length >= 2 && isCredit ? amts[0] : ''),
          balance: amts[amts.length-1] || ''
        });
      }
    });

    // Account meta
    const accMatch = text.match(/account\s*(?:no|number|#)[:\s]*([\d\-\s]{8,20})/i);
    const nameMatch = text.match(/(?:account\s*holder|name)[:\s]+([A-Z][a-zA-Z\s]+)/);
    const periodMatch = text.match(/(?:period|from|statement)[:\s]+([\d\/\-]+\s*(?:to|-)?\s*[\d\/\-]+)/i);

    return {
      meta: {
        accountNo: accMatch ? accMatch[1].trim() : 'N/A',
        holderName: nameMatch ? nameMatch[1].trim() : 'N/A',
        period: periodMatch ? periodMatch[1].trim() : 'N/A',
        totalTransactions: transactions.length
      },
      transactions
    };
  }

  function parseAccountStatement(text) {
    const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
    const items = [];
    const amtPattern = /(\d{1,3}(?:,\d{3})*(?:\.\d{2})?)/g;

    lines.forEach(line => {
      const amts = line.match(amtPattern);
      if (amts && line.length > 10) {
        const desc = line.replace(amtPattern, '').trim().replace(/\s+/g,' ');
        if (desc.length > 3) {
          items.push({ description: desc.slice(0,100), amount: amts[0], note: amts.length > 1 ? amts[amts.length-1] : '' });
        }
      }
    });

    const totalMatch = text.match(/total[:\s]*([\d,]+\.\d{2})/i);
    const dueMatch = text.match(/(?:due|payable)[:\s]*([\d,]+\.\d{2})/i);
    return { items, totalAmount: totalMatch ? totalMatch[1] : 'N/A', amountDue: dueMatch ? dueMatch[1] : 'N/A' };
  }

  function parseNews(text) {
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [];
    const words = text.split(/\s+/);
    const wordCount = words.length;
    const readTime = Math.ceil(wordCount / 200);

    // Extract headline (first meaningful line)
    const lines = text.split(/\n/).map(l=>l.trim()).filter(l=>l.length>10);
    const headline = lines[0] || 'Article';

    // Key points: pick longer sentences
    const keyPoints = sentences
      .filter(s => s.trim().length > 60 && s.trim().length < 300)
      .slice(0, 7)
      .map(s => s.trim());

    // Entities: capitalized words clusters
    const entityRegex = /\b([A-Z][a-z]+(?:\s+[A-Z][a-z]+){0,3})\b/g;
    const entityCounts = {};
    let m;
    while ((m = entityRegex.exec(text)) !== null) {
      const e = m[1];
      if (e.length > 3 && !/^(The|This|That|These|Those|When|While|After|Before|During|Since|Until|With|Without|From|Into|Upon)$/.test(e)) {
        entityCounts[e] = (entityCounts[e] || 0) + 1;
      }
    }
    const topEntities = Object.entries(entityCounts).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k])=>k);

    return { headline, wordCount, readTime, keyPoints, topEntities };
  }

  function parseGeneral(text) {
    const lines = text.split(/\n/).map(l=>l.trim()).filter(Boolean);
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [];
    const keyPoints = sentences.filter(s=>s.trim().length>50).slice(0,8).map(s=>s.trim());
    const wordCount = text.split(/\s+/).length;
    return { lines: lines.slice(0,50), wordCount, keyPoints };
  }

  // Render results
  function showResults() {
    if (results.length === 0) return;
    activeFileIdx = 0;
    resultsSection.classList.add('visible');
    renderFileSelector();
    renderActiveResult();

    // Default to first tab
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
    document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===0));
  }

  function renderFileSelector() {
    fileSelector.innerHTML = '';
    if (results.length <= 1) return;
    results.forEach((r,i) => {
      const tag = document.createElement('button');
      tag.className = 'file-tag' + (i===activeFileIdx ? ' active' : '');
      tag.textContent = r.name.replace('.pdf','').slice(0,20);
      tag.addEventListener('click', () => { activeFileIdx = i; renderFileSelector(); renderActiveResult(); });
      fileSelector.appendChild(tag);
    });
  }

  function renderActiveResult() {
    const r = results[activeFileIdx];
    if (!r) return;
    resultsTitle.textContent = r.name;
    rawContent.textContent = r.text || 'No text extracted.';

    if (r.type === 'bank') renderBankResult(r);
    else if (r.type === 'account') renderAccountResult(r);
    else if (r.type === 'news') renderNewsResult(r);
    else renderGeneralResult(r);
  }

  function renderBankResult(r) {
    const p = r.parsed;
    const txns = p.transactions;
    const totalDebits = txns.reduce((s,t) => s + parseFloat((t.debit||'0').replace(/,/g,'')||0), 0);
    const totalCredits = txns.reduce((s,t) => s + parseFloat((t.credit||'0').replace(/,/g,'')||0), 0);

    structuredContent.innerHTML = `
      <div class="summary-grid">
        <div class="summary-card"><div class="summary-label">Account No.</div><div class="summary-value mono" style="font-size:var(--text-base)">${p.meta.accountNo}</div></div>
        <div class="summary-card"><div class="summary-label">Transactions</div><div class="summary-value">${txns.length}</div></div>
        <div class="summary-card"><div class="summary-label">Total Credits</div><div class="summary-value positive">₹${totalCredits.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div>
        <div class="summary-card"><div class="summary-label">Total Debits</div><div class="summary-value negative">₹${totalDebits.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div>
      </div>
      ${txns.length > 0 ? `
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Date</th><th>Description</th><th>Debit</th><th>Credit</th><th>Balance</th></tr></thead>
          <tbody>${txns.map(t=>`<tr>
            <td class="mono">${t.date}</td>
            <td>${t.description}</td>
            <td class="${t.debit?'amount-debit':''}">${t.debit||'—'}</td>
            <td class="${t.credit?'amount-credit':''}">${t.credit||'—'}</td>
            <td class="mono">${t.balance||'—'}</td>
          </tr>`).join('')}</tbody>
        </table>
      </div>` : '<div class="empty-result"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><h3>No transactions detected</h3><p>Try switching to "Raw Text" tab to see extracted content.</p></div>'}
    `;

    summaryContent.innerHTML = `
      <div class="summary-grid" style="margin-bottom:var(--space-6)">
        <div class="summary-card"><div class="summary-label">Holder</div><div class="summary-value" style="font-size:var(--text-base)">${p.meta.holderName}</div></div>
        <div class="summary-card"><div class="summary-label">Period</div><div class="summary-value" style="font-size:var(--text-base)">${p.meta.period}</div></div>
        <div class="summary-card"><div class="summary-label">Net Flow</div><div class="summary-value ${totalCredits-totalDebits>=0?'positive':'negative'}">₹${Math.abs(totalCredits-totalDebits).toLocaleString('en-IN',{minimumFractionDigits:2})}</div></div>
      </div>
      <div class="key-points">
        <div class="key-point"><div class="kp-num">1</div><div class="kp-text">Total of <strong>${txns.length} transactions</strong> found in this statement.</div></div>
        <div class="key-point"><div class="kp-num">2</div><div class="kp-text">Total money <strong>credited: ₹${totalCredits.toLocaleString('en-IN',{minimumFractionDigits:2})}</strong></div></div>
        <div class="key-point"><div class="kp-num">3</div><div class="kp-text">Total money <strong>debited: ₹${totalDebits.toLocaleString('en-IN',{minimumFractionDigits:2})}</strong></div></div>
        <div class="key-point"><div class="kp-num">4</div><div class="kp-text">Net ${totalCredits>=totalDebits?'surplus':'deficit'} of <strong>₹${Math.abs(totalCredits-totalDebits).toLocaleString('en-IN',{minimumFractionDigits:2})}</strong> for the period.</div></div>
      </div>
    `;
  }

  function renderAccountResult(r) {
    const p = r.parsed;
    structuredContent.innerHTML = `
      <div class="summary-grid">
        <div class="summary-card"><div class="summary-label">Total Amount</div><div class="summary-value">₹${p.totalAmount}</div></div>
        <div class="summary-card"><div class="summary-label">Amount Due</div><div class="summary-value negative">₹${p.amountDue}</div></div>
        <div class="summary-card"><div class="summary-label">Line Items</div><div class="summary-value">${p.items.length}</div></div>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr><th>Description</th><th>Amount</th><th>Note</th></tr></thead>
          <tbody>${p.items.slice(0,50).map(t=>`<tr><td>${t.description}</td><td class="mono amount-credit">${t.amount}</td><td class="mono" style="color:var(--color-text-muted)">${t.note}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    `;
    summaryContent.innerHTML = `<div class="key-points">
      <div class="key-point"><div class="kp-num">1</div><div class="kp-text">Statement contains <strong>${p.items.length} line items</strong>.</div></div>
      <div class="key-point"><div class="kp-num">2</div><div class="kp-text">Total amount: <strong>₹${p.totalAmount}</strong></div></div>
      <div class="key-point"><div class="kp-num">3</div><div class="kp-text">Amount due/payable: <strong>₹${p.amountDue}</strong></div></div>
    </div>`;
  }

  function renderNewsResult(r) {
    const p = r.parsed;
    structuredContent.innerHTML = `
      <div class="summary-grid" style="margin-bottom:var(--space-6)">
        <div class="summary-card"><div class="summary-label">Word Count</div><div class="summary-value">${p.wordCount.toLocaleString()}</div></div>
        <div class="summary-card"><div class="summary-label">Read Time</div><div class="summary-value">${p.readTime} min</div></div>
        <div class="summary-card"><div class="summary-label">Key Points</div><div class="summary-value">${p.keyPoints.length}</div></div>
      </div>
      <h3 style="font-size:var(--text-lg);font-weight:600;margin-bottom:var(--space-4)">${p.headline}</h3>
      <div style="margin-bottom:var(--space-6)">
        <div style="font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);font-weight:600;margin-bottom:var(--space-3)">Key Points</div>
        <div class="key-points">${p.keyPoints.map((kp,i)=>`<div class="key-point"><div class="kp-num">${i+1}</div><div class="kp-text">${kp}</div></div>`).join('')}</div>
      </div>
      ${p.topEntities.length>0?`<div>
        <div style="font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);font-weight:600;margin-bottom:var(--space-3)">Mentioned Entities</div>
        <div style="display:flex;flex-wrap:wrap;gap:var(--space-2)">${p.topEntities.map(e=>`<span style="padding:2px 10px;border-radius:var(--radius-full);background:var(--color-primary-highlight);color:var(--color-primary);font-size:var(--text-xs);font-weight:500">${e}</span>`).join('')}</div>
      </div>`:''}
    `;
    summaryContent.innerHTML = `<div class="key-points">${p.keyPoints.map((kp,i)=>`<div class="key-point"><div class="kp-num">${i+1}</div><div class="kp-text">${kp}</div></div>`).join('')}</div>`;
  }

  function renderGeneralResult(r) {
    const p = r.parsed;
    structuredContent.innerHTML = `
      <div class="summary-grid">
        <div class="summary-card"><div class="summary-label">Word Count</div><div class="summary-value">${p.wordCount.toLocaleString()}</div></div>
        <div class="summary-card"><div class="summary-label">Lines</div><div class="summary-value">${r.text.split('\n').filter(Boolean).length}</div></div>
      </div>
      <div style="margin-bottom:var(--space-4);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-muted);font-weight:600">Key Sentences</div>
      <div class="key-points">${p.keyPoints.map((kp,i)=>`<div class="key-point"><div class="kp-num">${i+1}</div><div class="kp-text">${kp}</div></div>`).join('')}</div>
    `;
    summaryContent.innerHTML = structuredContent.innerHTML;
  }

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  // Copy
  document.getElementById('copyBtn').addEventListener('click', () => {
    const r = results[activeFileIdx];
    if (!r) return;
    navigator.clipboard.writeText(r.text).then(() => showToast('Copied to clipboard!'));
  });

  // Download
  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (results.length === 0) return;
    const r = results[activeFileIdx];
    if (!r) return;
    let content = '';
    if (r.type === 'bank' && r.parsed.transactions) {
      content = 'Date,Description,Debit,Credit,Balance\n';
      content += r.parsed.transactions.map(t => `"${t.date}","${t.description}","${t.debit}","${t.credit}","${t.balance}"`).join('\n');
      const blob = new Blob([content], {type:'text/csv'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = r.name.replace('.pdf','') + '_transactions.csv'; a.click();
    } else {
      const blob = new Blob([r.text], {type:'text/plain'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = r.name.replace('.pdf','') + '_extracted.txt'; a.click();
    }
    showToast('Download started!');
  });

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
